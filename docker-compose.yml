services:
  mysql:
    image: mysql:8.4
    container_name: agora-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "rootpass"
      MYSQL_DATABASE: "agora"
      MYSQL_USER: "agora"
      MYSQL_PASSWORD: "agora123"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--mysql-native-password=ON"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uagora", "-pagora123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
