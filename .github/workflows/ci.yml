name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Build client
        working-directory: client
        run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: payagent_test
          MYSQL_USER: payagent
          MYSQL_PASSWORD: payagent123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -upayagent -ppayagent123"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run tests
        working-directory: server
        run: npm test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: payagent
          DB_PASSWORD: payagent123
          DB_NAME: payagent_test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-build, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t payagent-api:${{ github.sha }} ./server

      - name: Build Client image
        run: docker build -t payagent-client:${{ github.sha }} ./client

      - name: Verify compose config
        run: docker compose config --quiet
