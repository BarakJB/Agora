server {
    listen 80;
    server_name genai.co.il app.genai.co.il;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    root /var/www/payagent/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
