# PayAgent — Nginx production config
# genai.co.il      → Landing page
# app.genai.co.il  → Client SPA + API proxy

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name genai.co.il app.genai.co.il;
    return 301 https://$host$request_uri;
}

# Landing page — genai.co.il
server {
    listen 443 ssl http2;
    server_name genai.co.il;

    ssl_certificate     /etc/letsencrypt/live/genai.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genai.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/payagent/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

# App — app.genai.co.il
server {
    listen 443 ssl http2;
    server_name app.genai.co.il;

    ssl_certificate     /etc/letsencrypt/live/app.genai.co.il/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.genai.co.il/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Stripe webhook needs larger body
        client_max_body_size 5m;
    }

    # Client SPA
    root /var/www/payagent/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com;" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
